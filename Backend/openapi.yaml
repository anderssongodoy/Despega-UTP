components:
  parameters:
    StudentId:
      in: path
      name: studentId
      required: true
      schema:
        type: string
      example: stu_camila
    EvidenceId:
      in: path
      name: evidenceId
      required: true
      schema:
        type: string
      example: ev_001
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
      example: job_data_retail
    ChallengeId:
      in: path
      name: challengeId
      required: true
      schema:
        type: string
      example: cha_sales_insight
    CompanyId:
      in: path
      name: companyId
      required: true
      schema:
        type: string
      example: comp_retail_andino

  responses:
    BadRequest:
      description: Request invalido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: BAD_REQUEST
              message: career, cycle, modality y targetRoleId son obligatorios.

  schemas:
    UserRole:
      type: string
      enum: [student, company, advisor]
    AuthProvider:
      type: string
      enum: [microsoft, credentials]
    Status:
      type: string
      enum: [ready, viable, aspirational, not_recommended, partial, critical]
    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
    AuthSession:
      type: object
      required: [user, authProvider, requiresOnboarding, redirectTo]
      properties:
        user:
          $ref: "#/components/schemas/User"
        companyId:
          type: string
          nullable: true
        authProvider:
          $ref: "#/components/schemas/AuthProvider"
        requiresOnboarding:
          type: boolean
        redirectTo:
          type: string
    AcademicProfile:
      type: object
      required: [career, cycle, campus, modality]
      properties:
        career:
          type: string
        cycle:
          type: integer
          minimum: 1
          maximum: 12
        campus:
          type: string
        modality:
          type: string
    EmploymentGoal:
      type: object
      required: [targetRoleId, targetRoleName, availability, preferredWorkMode, applicationTimeframe]
      properties:
        targetRoleId:
          type: string
        targetRoleName:
          type: string
        availability:
          type: string
        preferredWorkMode:
          type: string
        applicationTimeframe:
          type: string
    InitialEvidence:
      type: object
      required: [type, title, context, actions, result, skills]
      properties:
        type:
          type: string
        title:
          type: string
        context:
          type: string
        actions:
          type: string
        result:
          type: string
        skills:
          type: array
          items:
            type: string
    SelfAssessment:
      type: object
      required: [knownSkills, perceivedGaps, cvStatus]
      properties:
        knownSkills:
          type: array
          items:
            type: string
        perceivedGaps:
          type: array
          items:
            type: string
        cvStatus:
          type: string
          enum: [missing, incomplete, updated]
        linkedinUrl:
          type: string
          nullable: true
    OnboardingRequest:
      type: object
      required: [academicProfile, employmentGoal, selfAssessment]
      properties:
        academicProfile:
          $ref: "#/components/schemas/AcademicProfile"
        employmentGoal:
          $ref: "#/components/schemas/EmploymentGoal"
        initialEvidence:
          $ref: "#/components/schemas/InitialEvidence"
        selfAssessment:
          $ref: "#/components/schemas/SelfAssessment"
    CreatedEvidence:
      type: object
      required: [id, title, cvBullet]
      properties:
        id:
          type: string
        title:
          type: string
        cvBullet:
          type: string
    GoalSummary:
      type: object
      required: [roleId, roleName]
      properties:
        roleId:
          type: string
        roleName:
          type: string
        readinessScore:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
    InitialDiagnosis:
      type: object
      required: [readinessScore, status, criticalGaps]
      properties:
        readinessScore:
          type: integer
        status:
          type: string
        criticalGaps:
          type: array
          items:
            type: string
    OnboardingResponse:
      type: object
      required: [studentId, onboardingCompleted, goal, initialDiagnosis, redirectTo]
      properties:
        studentId:
          type: string
        onboardingCompleted:
          type: boolean
        createdEvidence:
          $ref: "#/components/schemas/CreatedEvidence"
        goal:
          $ref: "#/components/schemas/GoalSummary"
        initialDiagnosis:
          $ref: "#/components/schemas/InitialDiagnosis"
        redirectTo:
          type: string
    StudentSummary:
      type: object
      required: [id, name, career, cycle, modality]
      properties:
        id:
          type: string
        name:
          type: string
        career:
          type: string
        cycle:
          type: integer
        modality:
          type: string
    NextBestAction:
      type: object
      required: [title, description, targetPage]
      properties:
        title:
          type: string
        description:
          type: string
        targetPage:
          type: string
    CriticalGap:
      type: object
      required: [skillName, severity, message]
      properties:
        skillName:
          type: string
        severity:
          type: string
        message:
          type: string
    CriticalGapAffectedStudent:
      type: object
      required: [studentId, fullName, email, career, cycle, roleId, jobId, skillId, skillName, severity, status, source, currentLevel, requiredLevel]
      properties:
        studentId:
          type: string
        fullName:
          type: string
        email:
          type: string
        career:
          type: string
        cycle:
          type: integer
        roleId:
          type: string
          nullable: true
        jobId:
          type: string
          nullable: true
        skillId:
          type: string
        skillName:
          type: string
        severity:
          type: string
        status:
          type: string
        source:
          type: string
        currentLevel:
          type: integer
        requiredLevel:
          type: integer
    CriticalGapAffectedStudentsResponse:
      type: object
      required: [skillId, skillName, status, source, totalAffected, students]
      properties:
        skillId:
          type: string
        skillName:
          type: string
        status:
          type: string
        source:
          type: string
        totalAffected:
          type: integer
        students:
          type: array
          items:
            $ref: "#/components/schemas/CriticalGapAffectedStudent"
    RecommendedJob:
      type: object
      required: [jobId, title, companyName, matchScore, status]
      properties:
        jobId:
          type: string
        title:
          type: string
        companyName:
          type: string
        matchScore:
          type: integer
        status:
          type: string
    RecommendedResource:
      type: object
      required: [resourceId, name, reason]
      properties:
        resourceId:
          type: string
        name:
          type: string
        reason:
          type: string
    StudentProgress:
      type: object
      required: [evidences, challengesCompleted, applications, interviewPractice]
      properties:
        evidences:
          type: integer
        challengesCompleted:
          type: integer
        applications:
          type: integer
        interviewPractice:
          type: integer
    StudentDashboard:
      type: object
      required: [student, goal, nextBestAction, criticalGaps, recommendedJobs, recommendedResources, progress]
      properties:
        student:
          $ref: "#/components/schemas/StudentSummary"
        goal:
          $ref: "#/components/schemas/GoalSummary"
        nextBestAction:
