openapi: 3.0.3
info:
  title: Despega UTP API
  version: 0.1.0
  description: >
    Contrato API para el MVP de Despega UTP. Cubre login/session,
    onboarding de estudiante, dashboard, diagnostico, evidencias, CV,
    oportunidades, retos, empresa y asesor UTP.
servers:
  - url: http://localhost:8000/api
    description: Local development
tags:
  - name: Auth
  - name: Students
  - name: Jobs
  - name: Challenges
  - name: Companies
  - name: Advisor

paths:
  /auth/session:
    get:
      tags: [Auth]
      summary: Obtener sesion actual y destino inicial
      x-roles: [student, company, advisor]
      x-pages: [/login, /onboarding, /student/home, /company/dashboard, /advisor/impact]
      x-ui-usage: El login lo usa para decidir el rol activo, si debe mostrar onboarding y a que pagina redirigir.
      x-data-sources: [postgres]
      x-computed-by: auth.service
      description: Indica rol, proveedor de autenticacion, si requiere onboarding y a que ruta debe redirigir el frontend.
      responses:
        "200":
          description: Sesion actual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
              examples:
                studentNeedsOnboarding:
                  summary: Estudiante nuevo
                  value:
                    user:
                      id: stu_camila
                      name: Camila Torres
                      email: camila.torres@utp.edu.pe
                      role: student
                    authProvider: microsoft
                    requiresOnboarding: true
                    redirectTo: /onboarding
                company:
                  summary: Empresa
                  value:
                    user:
                      id: usr_recruiter_ana
                      name: Ana Reclutadora
                      email: ana@retailandino.pe
                      role: company
                    companyId: comp_retail_andino
                    authProvider: credentials
                    requiresOnboarding: false
                    redirectTo: /company/dashboard

  /students/{studentId}/onboarding:
    post:
      tags: [Students]
      summary: Completar onboarding inicial del estudiante
      x-roles: [student]
      x-pages: [/onboarding, /student/home]
      x-ui-usage: El onboarding envia los 4 pasos y recibe evidencia inicial, diagnostico inicial y redirect al dashboard estudiante.
      x-data-sources: [postgres, json-config, computed-service]
      x-computed-by: onboarding.service, cv-bullet.service, gap.service
      description: Guarda perfil academico, meta laboral, evidencia inicial y autoevaluacion.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
            examples:
              camila:
                value:
                  academicProfile:
                    career: Ingenieria de Sistemas e Informatica
                    cycle: 8
                    campus: Lima Centro
                    modality: Semipresencial
                  employmentGoal:
                    targetRoleId: role_data_intern
                    targetRoleName: Practicante de Analisis de Datos
                    availability: Practicas preprofesionales - 30h
                    preferredWorkMode: Hibrido
                    applicationTimeframe: En las proximas 2 semanas
                  initialEvidence:
                    type: academic_project
                    title: Dashboard de ventas para curso de BI
                    context: Proyecto final de curso
                    actions: Limpie datos en Excel y cree un dashboard en Power BI para analizar ventas.
                    result: El equipo identifico productos con mayor margen y presento recomendaciones.
                    skills: [sk_excel, sk_powerbi, sk_communication]
                  selfAssessment:
                    knownSkills: [sk_excel, sk_powerbi, sk_communication]
                    perceivedGaps: [sk_sql, sk_english, sk_interview]
                    cvStatus: incomplete
                    linkedinUrl: ""
      responses:
        "200":
          description: Onboarding completado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResponse"
              examples:
                success:
                  value:
                    studentId: stu_camila
                    onboardingCompleted: true
                    createdEvidence:
                      id: ev_001
                      title: Dashboard de ventas para curso de BI
                      cvBullet: Desarrolle un dashboard de ventas en Power BI a partir de datos limpiados en Excel, identificando productos de mayor margen para apoyar decisiones comerciales.
                    goal:
                      roleId: role_data_intern
                      roleName: Practicante de Analisis de Datos
                    initialDiagnosis:
                      readinessScore: 72
                      status: viable
                      criticalGaps: [SQL, Ingles, Entrevista]
                    redirectTo: /student/home
        "400":
          $ref: "#/components/responses/BadRequest"

  /students/{studentId}/dashboard:
    get:
      tags: [Students]
      summary: Obtener dashboard del estudiante
      x-roles: [student]
      x-pages: [/student/home]
      x-ui-usage: Alimenta cards de perfil, meta laboral, score, proxima accion, brechas, vacantes, recursos y progreso.
      x-data-sources: [postgres, json-config, computed-service]
      x-computed-by: dashboard.service, matching.service, resource-recommendation.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Dashboard del estudiante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDashboard"
              examples:
                camila:
                  value:
                    student:
                      id: stu_camila
                      name: Camila Torres
                      career: Ingenieria de Sistemas e Informatica
                      cycle: 8
                      modality: Semipresencial
                    goal:
                      roleId: role_data_intern
                      roleName: Practicante de Analisis de Datos
                      readinessScore: 72
                      status: viable
                    nextBestAction:
                      title: Completa una evidencia de SQL o dashboard
                      description: Tu perfil ya tiene base en Power BI, pero la vacante objetivo exige SQL intermedio.
                      targetPage: /student/profile?tab=evidence
                    criticalGaps:
                      - skillName: SQL
                        severity: partial
                        message: Te falta 1 nivel para vacantes de datos.
                      - skillName: Ingles
                        severity: critical
                        message: Limita vacantes con empresas regionales.
                    recommendedJobs:
                      - jobId: job_data_retail
                        title: Practicante de Analisis de Datos
                        companyName: Retail Andino
                        matchScore: 74
                        status: viable
                    recommendedResources:
                      - resourceId: res_ruta_laboral
                        name: Ruta Laboral Virtual
                        reason: Refuerza CV y marca personal antes de postular.
                    progress:
                      evidences: 2
                      challengesCompleted: 0
                      applications: 2
                      interviewPractice: 1

  /roles:
    get:
      tags: [Students]
      summary: Listar roles laborales objetivo
      x-roles: [student]
      x-pages: [/onboarding, /student/route]
      x-ui-usage: Llena el selector de meta laboral en onboarding y en Ruta Profesional.
      x-data-sources: [json-config]
      x-computed-by: roles-config.service
      responses:
        "200":
          description: Roles disponibles
          content:
            application/json:
              schema:
                type: object
                required: [roles]
                properties:
                  roles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
              examples:
                roles:
                  value:
                    roles:
                      - id: role_data_intern
                        name: Practicante de Analisis de Datos
                        family: Tecnologia / Datos
                        recommendedCycleMin: 7
                      - id: role_marketing_assistant
                        name: Asistente de Marketing
                        family: Marketing / Comunicacion
                        recommendedCycleMin: 6

  /critical-gaps/{skillId}/students:
    get:
      tags: [Students]
      summary: Listar estudiantes afectados por una brecha critica
      x-roles: [advisor, student]
      x-pages: [/student/route, /advisor/impact]
      x-ui-usage: Permite abrir una brecha especifica y ver estudiantes con esa brecha abierta o resuelta.
      x-data-sources: [postgres]
      x-computed-by: critical-gap.service
      parameters:
        - in: path
          name: skillId
          required: true
          schema:
            type: string
          example: sk_english
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [open, resolved]
            default: open
        - in: query
          name: source
          required: false
          schema:
            type: string
            enum: [role, job, all]
            default: all
        - in: query
          name: roleId
          required: false
          schema:
            type: string
          example: role_data_intern
        - in: query
          name: jobId
          required: false
          schema:
            type: string
          example: job_data_retail
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Estudiantes afectados por la brecha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriticalGapAffectedStudentsResponse"
              example:
                skillId: sk_english
                skillName: Ingles
                status: open
                source: all
                totalAffected: 2
                students:
                  - studentId: stu_camila
                    fullName: Camila Torres
                    email: camila.torres@utp.edu.pe
                    career: Ingenieria de Sistemas e Informatica
                    cycle: 8
                    roleId: role_data_intern
                    jobId: null
                    skillId: sk_english
                    skillName: Ingles
                    severity: partial
                    status: open
                    source: role
                    currentLevel: 1
                    requiredLevel: 3
                  - studentId: stu_camila
                    fullName: Camila Torres
                    email: camila.torres@utp.edu.pe
                    career: Ingenieria de Sistemas e Informatica
                    cycle: 8
                    roleId: role_data_intern
                    jobId: job_data_retail
                    skillId: sk_english
                    skillName: Ingles
                    severity: partial
                    status: open
                    source: job
                    currentLevel: 1
                    requiredLevel: 3

  /students/{studentId}/goal:
    post:
      tags: [Students]
      summary: Actualizar meta laboral del estudiante
      x-roles: [student]
      x-pages: [/student/route]
      x-ui-usage: Se usa cuando el estudiante cambia su rol objetivo en Ruta Profesional.
      x-data-sources: [postgres, json-config]
      x-computed-by: goals.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleId]
              properties:
                roleId:
                  type: string
                  example: role_data_intern
      responses:
        "200":
          description: Meta actualizada
          content:
            application/json:
              schema:
                type: object
                required: [studentId, roleId, message]
                properties:
                  studentId:
                    type: string
                  roleId:
                    type: string
                  message:
                    type: string
              example:
                studentId: stu_camila
                roleId: role_data_intern
                message: Meta laboral actualizada.

  /students/{studentId}/diagnosis:
    get:
      tags: [Students]
      summary: Obtener diagnostico de empleabilidad
      x-roles: [student]
      x-pages: [/student/route, /student/home]
      x-ui-usage: Alimenta tab Diagnostico de Ruta Profesional y puede resumirse en Inicio.
      x-data-sources: [postgres, json-config, computed-service]
      x-computed-by: diagnosis.service, gap.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Diagnostico de empleabilidad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"
              example:
                studentId: stu_camila
                role:
                  id: role_data_intern
                  name: Practicante de Analisis de Datos
                readinessScore: 72
                dimensions:
                  - name: CV
                    score: 60
                    status: partial
                  - name: Habilidades tecnicas
                    score: 68
                    status: partial
                  - name: Evidencia
                    score: 80
                    status: ready
                  - name: Entrevista
                    score: 55
                    status: partial
                  - name: Ingles
                    score: 35
                    status: critical
                message: Tu perfil tiene evidencia aplicable, pero necesita reforzar SQL e ingles para ampliar opciones.

  /students/{studentId}/gaps:
    get:
      tags: [Students]
      summary: Obtener brechas contra una vacante
      x-roles: [student]
      x-pages: [/student/route, /student/opportunities]
      x-ui-usage: Alimenta tab Brechas de Ruta Profesional y el detalle de brechas por vacante en Oportunidades.
      x-data-sources: [postgres, computed-service]
      x-computed-by: gap.service, matching.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
        - in: query
          name: jobId
          required: true
          schema:
            type: string
          example: job_data_retail
      responses:
        "200":
          description: Brechas contra vacante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GapAnalysis"
              example:
                studentId: stu_camila
                jobId: job_data_retail
                matchScore: 74
                gaps:
                  - skillId: sk_sql
                    skillName: SQL
                    currentLevel: 2
                    requiredLevel: 3
                    severity: partial
                    recommendedAction: Practica consultas SELECT, JOIN y filtros con una base simple.
                canApplyToday: true
                applyAdvice: Puedes postular si ajustas tu CV y explicas tu proyecto de BI como evidencia.

  /students/{studentId}/action-plan:
    get:
      tags: [Students]
      summary: Obtener plan de accion del estudiante
      x-roles: [student]
      x-pages: [/student/route, /student/home]
      x-ui-usage: Alimenta tab Plan 14 dias y la proxima mejor accion del dashboard.
      x-data-sources: [postgres, json-config, computed-service]
      x-computed-by: action-plan.service, resource-recommendation.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Plan de accion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionPlan"
              example:
                studentId: stu_camila
                days:
                  - day: 1
                    title: Ajustar CV para Analisis de Datos
                    type: cv
                    minutes: 45
                    resourceId: null
                  - day: 2
                    title: Completar practica rapida de SQL
                    type: skill
                    minutes: 60
                    resourceId: null
                  - day: 4
                    title: Revisar modulo de Ruta Laboral Virtual sobre CV
                    type: utp_resource
                    minutes: 45
                    resourceId: res_ruta_laboral

  /students/{studentId}/evidences:
    get:
      tags: [Students]
      summary: Listar evidencias del estudiante
      x-roles: [student, company]
      x-pages: [/student/profile, /company/talent]
      x-ui-usage: En estudiante muestra Lab de Evidencia; en empresa puede alimentar highlights del candidato.
      x-data-sources: [postgres]
      x-computed-by: evidences.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Evidencias del estudiante
          content:
            application/json:
              schema:
                type: object
                required: [evidences]
                properties:
                  evidences:
                    type: array
                    items:
                      $ref: "#/components/schemas/Evidence"
              example:
                evidences:
                  - id: ev_001
                    title: Dashboard de ventas para curso de BI
                    type: academic_project
                    skills: [Excel, Power BI, Comunicacion]
                    cvBullet: Desarrolle un dashboard de ventas en Power BI a partir de datos limpiados en Excel, identificando productos de mayor margen y comunicando recomendaciones al equipo.
    post:
      tags: [Students]
      summary: Crear evidencia del estudiante
      x-roles: [student]
      x-pages: [/student/profile, /onboarding, /student/challenges]
      x-ui-usage: Crea evidencias desde Perfil Profesional, evidencia inicial de onboarding o evidencia generada por retos.
      x-data-sources: [postgres, computed-service]
      x-computed-by: evidences.service, cv-bullet.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvidenceRequest"
            example:
              title: Atencion al cliente en negocio familiar
              type: work_experience
              context: Apoyo fines de semana
              actions: Atendi clientes, registre pedidos y resolvi reclamos.
              result: Reduje errores en pedidos repetidos al crear una lista de control.
              skills: [sk_communication, sk_problem_solving, sk_organization]
      responses:
        "201":
          description: Evidencia creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvidenceResponse"
              example:
                id: ev_005
                studentId: stu_camila
                title: Atencion al cliente en negocio familiar
                cvBullet: Gestione atencion a clientes y registro de pedidos en negocio familiar, resolviendo reclamos y reduciendo errores mediante una lista de control.
                starStory: "Situacion: apoyo en negocio familiar. Tarea: reducir errores de pedidos. Accion: registre pedidos y cree lista de control. Resultado: disminuyeron errores repetidos."
                skillsMapped: [Comunicacion, Resolucion de problemas, Organizacion]

  /evidences/{evidenceId}/generate-cv-bullet:
    post:
      tags: [Students]
      summary: Generar bullet CV desde evidencia
      x-roles: [student]
      x-pages: [/student/profile, /student/opportunities]
      x-ui-usage: Genera o regenera bullets para el tab CV y para el Kit de postulacion.
      x-data-sources: [postgres, computed-service]
      x-computed-by: cv-bullet.service
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetRoleId, mode]
              properties:
                targetRoleId:
                  type: string
                  example: role_data_intern
                mode:
                  type: string
                  enum: [fallback, ai]
                  example: fallback
      responses:
        "200":
          description: Bullet generado
          content:
            application/json:
              schema:
                type: object
                required: [evidenceId, cvBullet, tone, source]
                properties:
                  evidenceId:
                    type: string
                  cvBullet:
                    type: string
                  tone:
                    type: string
                  source:
                    type: string
                    enum: [template, ai]
              example:
                evidenceId: ev_001
                cvBullet: Desarrolle un dashboard de ventas en Power BI a partir de datos limpiados en Excel, identificando productos de mayor margen para apoyar decisiones comerciales.
                tone: professional
                source: template

  /students/{studentId}/cv:
    get:
      tags: [Students]
      summary: Obtener CV armado por rol
      x-roles: [student]
      x-pages: [/student/profile, /student/opportunities]
      x-ui-usage: Alimenta tab CV y los bullets recomendados dentro del Kit de postulacion.
      x-data-sources: [postgres, json-config, computed-service]
      x-computed-by: cv.service, cv-bullet.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
        - in: query
          name: roleId
          required: true
          schema:
            type: string
          example: role_data_intern
      responses:
        "200":
          description: CV recomendado por rol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCv"
              example:
                studentId: stu_camila
                targetRole: Practicante de Analisis de Datos
                summary: Estudiante de Ingenieria de Sistemas con interes en analisis de datos, dashboards y mejora de procesos.
                bullets:
                  - evidenceId: ev_001
                    text: Desarrolle un dashboard de ventas en Power BI a partir de datos limpiados en Excel, identificando productos de mayor margen para apoyar decisiones comerciales.
                    recommended: true
                missingSections: [LinkedIn, Ingles, Certificaciones]

  /students/{studentId}/passport:
    get:
      tags: [Students]
      summary: Obtener pasaporte de empleabilidad
      x-roles: [student, company]
      x-pages: [/student/profile, /company/talent]
      x-ui-usage: En estudiante muestra competencias evidenciadas; en empresa puede explicar fortalezas del candidato.
      x-data-sources: [postgres, computed-service]
      x-computed-by: passport.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Pasaporte de competencias
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
              example:
                studentId: stu_camila
                competencies:
                  - name: Tecnologia
                    level: 3
                    evidenceCount: 2
                    evidences: [Dashboard de ventas, Micro-reto de insights]
                  - name: Comunicacion
                    level: 3
                    evidenceCount: 2
                    evidences: [Presentacion de proyecto, Atencion al cliente]

  /students/{studentId}/interview-kit:
    get:
      tags: [Students]
      summary: Obtener kit de entrevista
      x-roles: [student]
      x-pages: [/student/profile, /student/opportunities]
      x-ui-usage: Alimenta tab Entrevista y preguntas del Kit de postulacion por vacante.
      x-data-sources: [postgres, computed-service]
      x-computed-by: interview-kit.service, cv-bullet.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
        - in: query
          name: jobId
          required: true
          schema:
            type: string
          example: job_data_retail
      responses:
        "200":
          description: Kit de entrevista
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewKit"
              example:
                pitch: Soy estudiante de Ingenieria de Sistemas de 8vo ciclo, con experiencia academica en dashboards y analisis de datos.
                questions:
                  - question: Cuentame de un proyecto donde usaste datos.
                    suggestedAnswer: Use el proyecto de dashboard de ventas y explique el proceso con estructura STAR.
                  - question: Que harias si encuentras datos incompletos?
                    suggestedAnswer: Explicar limpieza, validacion y comunicacion de supuestos.

  /jobs:
    get:
      tags: [Jobs]
      summary: Listar vacantes
      x-roles: [student, company]
      x-pages: [/student/opportunities, /company/dashboard]
      x-ui-usage: Lista vacantes base para Oportunidades y resumen de vacantes activas de empresa.
      x-data-sources: [postgres]
      x-computed-by: jobs.service
      parameters:
        - in: query
          name: roleId
          required: false
          schema:
            type: string
          example: role_data_intern
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [active, closed]
          example: active
      responses:
        "200":
          description: Vacantes
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobSummary"
              example:
                jobs:
                  - id: job_data_retail
                    title: Practicante de Analisis de Datos
                    companyName: Retail Andino
                    modality: Hibrido
                    location: Lima
                    hours: 30h semanales
                  - id: job_bi_finanzas
                    title: Practicante BI Junior
                    companyName: Finanzas Nova
                    modality: Remoto
                    location: Lima
                    hours: 30h semanales
                  - id: job_operations_logisur
                    title: Practicante de Operaciones
                    companyName: Logisur
                    modality: Presencial
                    location: Lima
                    hours: 30h semanales
                  - id: job_marketing_talentolab
                    title: Asistente de Marketing Digital
                    companyName: TalentoLab
                    modality: Hibrido
                    location: Lima
                    hours: Medio tiempo
                  - id: job_hr_talentolab
                    title: Practicante de Recursos Humanos
                    companyName: TalentoLab
                    modality: Remoto
                    location: Lima
                    hours: Medio tiempo
                  - id: job_support_datamarket
                    title: Soporte TI Junior
                    companyName: DataMarket Peru
                    modality: Presencial
                    location: Lima
                    hours: Tiempo completo

  /students/{studentId}/job-matches:
    get:
      tags: [Jobs]
      summary: Obtener vacantes recomendadas para estudiante
      x-roles: [student]
      x-pages: [/student/home, /student/opportunities]
      x-ui-usage: Alimenta vacantes sugeridas en Inicio y cards principales de Oportunidades.
      x-data-sources: [postgres, computed-service]
      x-computed-by: matching.service
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Matches de vacantes
          content:
            application/json:
              schema:
                type: object
                required: [matches]
